<!DOCTYPE html>
<html>

<head>
    <title>Page 2</title>
</head>

<body>

    <h2>Page 2</h2>

    <p id="display"></p>
    <script>
        // get query string
        var queryString = window.location.search;

        // create an object to work with query string
        var urlParams = new URLSearchParams(queryString);

        // get name and city from query string
        var name = urlParams.get("name");
        var city = urlParams.get("city");

        // display name and city
        document.getElementById("display").innerHTML =
            "Name: " + name + "<br>City: " + city;
    </script>
</body>

</html>
