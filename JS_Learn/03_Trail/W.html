<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You Marimuthu Sir!</title>
    <style>
        body {
            background-color: #0b0d17;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            cursor: crosshair;
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 40px;
            border: 2px solid #ffd700;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
            pointer-events: none; /* Allows mouse tracking through the box */
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            background: linear-gradient(45deg, #fff, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 10px rgba(255, 215, 0, 0.5);
        }

        p {
            font-size: 1.8rem;
            margin-top: 10px;
            color: #f0f0f0;
            font-weight: 300;
        }

        /* Fireworks */
        .firework {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 5px;
            height: 5px;
            border-radius: 50%;
            box-shadow: 0 0 #fff;
            animation: firework 2.5s infinite;
        }

        .firework:nth-child(2) { left: 20%; top: 30%; animation-delay: 0.5s; color: #ff0040; }
        .firework:nth-child(3) { left: 80%; top: 20%; animation-delay: 1.2s; color: #00ff80; }
        .firework:nth-child(4) { left: 15%; top: 70%; animation-delay: 0.8s; color: #00bfff; }
        .firework:nth-child(5) { left: 85%; top: 75%; animation-delay: 1.5s; color: #f0f; }

        @keyframes firework {
            0% { transform: translate(-50%, 60vh); width: 4px; opacity: 1; }
            50% { width: 4px; opacity: 1; }
            100% { 
                width: 2px;
                box-shadow: -100px -100px 0 2px currentColor, 100px -100px 0 2px currentColor, 100px 100px 0 2px currentColor, -100px 100px 0 2px currentColor, 0 -150px 0 2px currentColor, 0 150px 0 2px currentColor, -150px 0 0 2px currentColor, 150px 0 0 2px currentColor;
                opacity: 0; 
            }
        }

        /* Sparkling Stars Logic */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: gold;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px #fff, 0 0 20px gold;
            animation: fly 1s linear forwards;
        }

        @keyframes fly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="firework"></div>
    <div class="firework"></div>
    <div class="firework"></div>
    <div class="firework"></div>
    <div class="firework"></div>

    <div class="container">
        <h1>Thank you so much,</h1>
        <p>Marimuthu Sir</p>
    </div>

    <script>
        document.addEventListener('mousemove', function(e) {
            for (let i = 0; i < 3; i++) { // Creates 3 sparkles per move
                let sparkle = document.createElement('div');
                sparkle.classList.add('sparkle');
                document.body.appendChild(sparkle);

                // Position at mouse coordinates
                sparkle.style.left = e.clientX + 'px';
                sparkle.style.top = e.clientY + 'px';

                // Random scatter direction
                const moveX = (Math.random() - 0.5) * 100;
                const moveY = (Math.random() - 0.5) * 100;
                sparkle.style.setProperty('--x', moveX + 'px');
                sparkle.style.setProperty('--y', moveY + 'px');

                // Clean up after animation
                setTimeout(() => {
                    sparkle.remove();
                }, 1000);
            }
        });
    </script>
</body>
</html>
