<div class="container mt-5">

  <h2 class="text-center mb-4 fw-bold">🛍 Product List</h2>

  <div class="table-responsive shadow-lg rounded">
    <table class="table table-hover table-bordered align-middle text-center">

      <thead class="table-dark">
        <tr>
          <th>Product ID</th>
          <th>Product Name</th>
          <th>Price</th>
          <th>Mfg Date</th>
          <th>Exp Date</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let p of products" class="table-light">

          <td class="fw-semibold">{{ p.id }}</td>

          <td class="text-primary fw-bold">
            {{ p.name | uppercase }}
          </td>

          <td class="text-success fw-semibold">
            {{ p.price | currency:'INR' }}
          </td>

          <td>
            {{ p.mfgDate | date:'MMM d, y' }}
          </td>

          <td class="text-danger">
            {{ p.expDate | date:'EEEE, MMMM d, y' }}
          </td>

        </tr>
      </tbody>

    </table>
    <div class="container mt-4">
      <app-product-form (productRegistered)="registerProduct($event)"></app-product-form>
    </div>
  </div>

</div>
